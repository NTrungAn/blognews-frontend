<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F9FAFB; /* Level 0 Background per Style Guidance */
        }
        .login-card {
            box-shadow: 0px 1px 3px rgba(0,0,0,0.05); /* Level 1 Elevation */
            border: 1px solid #E5E7EB;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #0058be;
            box-shadow: 0 0 0 2px rgba(0, 88, 190, 0.1);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="flex items-center justify-center min-h-screen text-on-surface p-sm">
<main class="w-full max-w-[420px] animate-in fade-in duration-700">
<!-- Brand Identity -->
<div class="text-center mb-lg">
<div class="inline-flex items-center justify-center w-12 h-12 bg-primary rounded-xl mb-md">
<span class="material-symbols-outlined text-white text-3xl">article</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-on-surface">
                NewsFlow CMS
            </h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-base">
                Chào mừng trở lại. Vui lòng đăng nhập.
            </p>
</div>
<!-- Login Card -->
<div class="login-card bg-white rounded-xl p-md md:p-lg">
<form class="space-y-sm" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">
                        Email
                    </label>
<div class="relative">
<input class="w-full px-sm py-2.5 rounded-lg border border-outline-variant font-body-md text-body-md bg-white input-focus-ring transition-all placeholder:text-outline" id="email" name="email" placeholder="name@company.com" type="email"/>
</div>
<!-- Error Area -->
<p class="hidden font-label-sm text-label-sm text-error flex items-center gap-1" id="email-error">
<span class="material-symbols-outlined text-[14px]">error</span>
                        Email không hợp lệ
                    </p>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">
                            Mật khẩu
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Quên mật khẩu?</a>
</div>
<div class="relative group">
<input class="w-full px-sm py-2.5 pr-10 rounded-lg border border-outline-variant font-body-md text-body-md bg-white input-focus-ring transition-all placeholder:text-outline" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-md" id="eye-icon">visibility</span>
</button>
</div>
<!-- Error Area -->
<p class="hidden font-label-sm text-label-sm text-error flex items-center gap-1" id="password-error">
<span class="material-symbols-outlined text-[14px]">error</span>
                        Mật khẩu phải ít nhất 8 ký tự
                    </p>
</div>
<!-- Submit Button -->
<div class="pt-base">
<button class="w-full h-12 bg-primary text-on-primary font-label-md text-label-md rounded-lg hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Đăng nhập
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</form>
<!-- Social Login Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="px-sm bg-white text-on-surface-variant uppercase tracking-wider">Hoặc tiếp tục với</span>
</div>
</div>
<div class="grid grid-cols-2 gap-sm">
<button class="flex items-center justify-center gap-2 py-2 px-md border border-outline-variant rounded-lg hover:bg-surface transition-colors font-label-md text-label-md">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
                    Google
                </button>
<button class="flex items-center justify-center gap-2 py-2 px-md border border-outline-variant rounded-lg hover:bg-surface transition-colors font-label-md text-label-md">
<span class="material-symbols-outlined text-[#1877F2]">face_nod</span>
                    Facebook
                </button>
</div>
</div>
<!-- Footer Link -->
<p class="text-center mt-md font-body-sm text-body-sm text-on-surface-variant">
            Chưa có tài khoản? 
            <a class="text-primary font-semibold hover:underline decoration-2 underline-offset-4" href="#">Đăng ký ngay</a>
</p>
</main>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Mock validation for demonstration
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            const emailError = document.getElementById('email-error');
            const passwordError = document.getElementById('password-error');

            let isValid = true;

            // Reset
            emailError.classList.add('hidden');
            passwordError.classList.add('hidden');
            email.classList.remove('border-error');
            password.classList.remove('border-error');

            if (!email.value || !email.value.includes('@')) {
                emailError.classList.remove('hidden');
                email.classList.add('border-error');
                isValid = false;
            }

            if (password.value.length < 8) {
                passwordError.classList.remove('hidden');
                password.classList.add('border-error');
                isValid = false;
            }

            if (isValid) {
                console.log('Form logic ready for React Hook Form integration with names:', {
                    email: email.name,
                    password: password.name
                });
                alert('Đang xử lý đăng nhập...');
            }
        });
    </script>
</body></html>
